# SPDX-License-Identifier: MIT
#
# Fast trunk checks: ruff + static analysis, native tests, the layering invariants, embedded-JS
# syntax, and device-profile schema validation. Runs on every push to main and every pull
# request. A PR that adds a device profile gets its TOML validated here without a maintainer
# lifting a finger.
#
# The firmware compile lives in its own pull-request-only workflow (firmware.yml), so a push to
# main posts no firmware check and a release does not rebuild what the PR already built. See
# that file for the reasoning.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs, never a main-branch run. head_ref is set only on pull_request
# events, so PR pushes share a group and the older run is cancelled the moment a newer push
# lands; a push to main falls back to the unique run_id, so every trunk commit runs to
# completion. (firmware.yml carries the same guard for the builds.)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v6
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-native-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install tools
        # ruff is PINNED on purpose. Left unpinned it floats to the latest release, whose
        # default rule set drifts -- a new ruff enabling RUF100/EXE001 failed an unrelated
        # feature PR on pre-existing tools/ files (2026-07-23). Bumping ruff is now a
        # deliberate change (raise the pin, fix what it finds) instead of a random red build.
        run: pip install platformio "ruff==0.15.18"

      - name: Ruff (Python tools)
        run: |
          ruff check tools/
          ruff format --check tools/

      - name: Static analysis (cppcheck via pio check)
        run: pio check -e native --severity=high --fail-on-defect=high

  test:
    name: Native tests + checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v6
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-native-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Validate device profiles
        run: python3 tools/gen_profiles.py --check

      - name: Layering invariants
        run: bash tools/check_layering.sh

      - name: Embedded JS syntax
        run: python3 tools/check_web_js.py

      - name: Native test suite
        run: pio test -e native
