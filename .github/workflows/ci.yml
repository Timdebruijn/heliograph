# SPDX-License-Identifier: MIT
#
# The same verification ritual that runs locally before every release:
# native tests, the layering invariants, embedded-JS syntax, profile schema
# validation, and both firmware builds. A PR that adds a device profile gets
# its TOML validated here without a maintainer lifting a finger.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs, never a main-branch run. head_ref is set only on
# pull_request events, so PR pushes share a group and the older run is cancelled the
# moment a newer push lands; a push to main falls back to the unique run_id, so every
# trunk commit is still verified end to end. Before this, six pushes to one PR meant six
# full firmware matrices stacked in parallel.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v6
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-native-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install tools
        # ruff is PINNED on purpose. Left unpinned it floats to the latest release, whose
        # default rule set drifts -- a new ruff enabling RUF100/EXE001 failed an unrelated
        # feature PR on pre-existing tools/ files (2026-07-23). Bumping ruff is now a
        # deliberate change (raise the pin, fix what it finds) instead of a random red build.
        run: pip install platformio "ruff==0.15.18"

      - name: Ruff (Python tools)
        run: |
          ruff check tools/
          ruff format --check tools/

      - name: Static analysis (cppcheck via pio check)
        run: pio check -e native --severity=high --fail-on-defect=high

  test:
    name: Native tests + checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v6
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-native-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Validate device profiles
        run: python3 tools/gen_profiles.py --check

      - name: Layering invariants
        run: bash tools/check_layering.sh

      - name: Embedded JS syntax
        run: python3 tools/check_web_js.py

      - name: Native test suite
        run: pio test -e native

  firmware:
    name: Firmware (${{ matrix.env }})
    runs-on: ubuntu-latest
    # PR-only: the firmware compile is the gate that must pass BEFORE code reaches main, so it
    # belongs on the pull_request event. A push to main is the same tree the PR already built;
    # rebuilding it proved nothing and, on a release tag's bump commit, ran a second full matrix
    # next to release.yml's own build. lint + test still run on main as the trunk gate; the
    # release workflow re-verifies and builds the shipping images before publishing. (Direct
    # pushes to main bypass this compile check -- acceptable because all changes land via PR.)
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        env: [waveshare-rs485-can, waveshare-relay-1ch, waveshare-relay-6ch, mock]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v6
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-fw-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

      - name: Upload firmware artifacts
        if: matrix.env != 'mock'
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.env }}-${{ github.sha }}
          path: |
            .pio/build/${{ matrix.env }}/firmware.bin
            .pio/build/${{ matrix.env }}/firmware.factory.bin
          retention-days: 14
