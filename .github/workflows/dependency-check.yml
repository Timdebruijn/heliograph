# SPDX-License-Identifier: MIT
#
# Dependabot cannot read platformio.ini, so this fills the gap: once a month it asks
# PlatformIO which pinned platforms/libraries have newer releases and opens (or updates)
# a single tracking issue when there is something to report. It deliberately does NOT
# open pull requests: an embedded toolchain or library bump must be a deliberate,
# hardware-tested change, never an auto-merge.

name: Dependency check

on:
  schedule:
    - cron: "17 6 1 * *" # monthly, first day, 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  outdated:
    name: pio pkg outdated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Check for outdated packages
        id: outdated
        run: |
          pio pkg install -e waveshare-eversolar -e native >/dev/null
          OUT=$(pio pkg outdated 2>&1 | tee /dev/stderr)
          {
            echo "report<<EOF"
            echo "$OUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if echo "$OUT" | grep -q "Everything is up-to-date"; then
            echo "updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update tracking issue
        if: steps.outdated.outputs.updates == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT: ${{ steps.outdated.outputs.report }}
        run: |
          TITLE="PlatformIO dependencies have updates available"
          BODY=$(printf 'Monthly `pio pkg outdated` report:\n\n```\n%s\n```\n\nReview the changelogs and bump deliberately — toolchain and library updates are hardware-tested changes, per docs/decisions.md.' "$REPORT")
          EXISTING=$(gh issue list --state open --search "\"$TITLE\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label dependencies
          fi
